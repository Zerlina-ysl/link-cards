<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} - 链接导航</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="page-wrapper">
        <div class="card-container">
            <header class="card-header">
                <div class="page-logo">
                    <svg width="32" height="32" viewBox="0 0 36 36" fill="none">
                        <rect width="36" height="36" rx="10" fill="url(#logo-gradient2)"/>
                        <path d="M12 18L16 14L20 18L24 14" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M12 22L16 18L20 22L24 18" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
                        <defs>
                            <linearGradient id="logo-gradient2" x1="0" y1="0" x2="36" y2="36" gradientUnits="userSpaceOnUse">
                                <stop stop-color="#6366F1"/>
                                <stop offset="1" stop-color="#8B5CF6"/>
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <h1>{{.Title}}</h1>
                <span class="card-count">{{len .Cards}} 个链接</span>
            </header>

            <main class="cards-grid">
                {{range .Cards}}
                <a href="{{.URL}}" target="_blank" class="link-card" data-url="{{.URL}}" data-title="{{.Title}}">
                    <div class="link-icon">
                        <img data-favicon="{{.Favicon}}"
                             alt="{{.Title}}"
                             loading="eager"
                             decoding="async" />
                    </div>
                    <div class="link-title">{{.Title}}</div>
                </a>
                {{end}}
            </main>

            <script>
                // 页面加载完成后，预连接到图标服务器
                (function() {
                    const preconnect = document.createElement('link');
                    preconnect.rel = 'preconnect';
                    preconnect.href = 'https://www.google.com';
                    document.head.appendChild(preconnect);

                    const dnsPreconnect = document.createElement('link');
                    dnsPreconnect.rel = 'dns-prefetch';
                    dnsPreconnect.href = 'https://www.google.com';
                    document.head.appendChild(dnsPreconnect);

                    // 从 data-favicon 属性设置图标 URL（避免 HTML 转义问题）
                    document.querySelectorAll('.link-icon img').forEach(img => {
                        const faviconUrl = img.getAttribute('data-favicon');
                        const card = img.closest('.link-card');
                        const targetUrl = card ? card.dataset.url : '';
                        const title = card ? card.dataset.title : '';

                        if (targetUrl) {
                            // 如果后端已经检测到图标不可用（返回空字符串），直接显示生成图标
                            if (!faviconUrl || faviconUrl.trim() === '') {
                                const defaultIcon = generateDefaultIcon(targetUrl, title);
                                if (defaultIcon) {
                                    img.src = defaultIcon;
                                }
                            } else {
                                // 后端检测通过的图标，直接使用
                                const decodedUrl = faviconUrl.replace(/&amp;/g, '&');
                                img.src = decodedUrl;

                                // 添加错误处理，以防后端检测不准确
                                img.onerror = function() {
                                    const defaultIcon = generateDefaultIcon(targetUrl, title);
                                    if (defaultIcon) {
                                        img.src = defaultIcon;
                                        img.onerror = null;
                                    }
                                };
                            }
                        }
                    });
                })();


                // 生成默认图标（优先使用链接标题，回退到域名首字母）
                function generateDefaultIcon(url, title) {
                    try {
                        const urlObj = new URL(url);
                        const domain = urlObj.hostname.replace('www.', '');

                        // 优先使用标题的首字母，如果没有标题则使用域名首字母
                        let displayText = '';
                        if (title && title.trim()) {
                            // 取标题前两个字符（支持中英文）
                            const trimmedTitle = title.trim();
                            displayText = trimmedTitle.substring(0, 2);
                            // 只对英文字符转大写，中文保持原样
                            if (/^[a-zA-Z]/.test(displayText)) {
                                displayText = displayText.toUpperCase();
                            }
                        } else {
                            // 回退到域名首字母
                            displayText = domain.charAt(0).toUpperCase();
                        }

                        // 生成颜色（基于域名，保证同一域名颜色一致）
                        const colors = [
                            '#6366F1', '#8B5CF6', '#EC4899', '#EF4444',
                            '#F59E0B', '#10B981', '#3B82F6', '#06B6D4'
                        ];
                        const colorIndex = domain.charCodeAt(0) % colors.length;
                        const color = colors[colorIndex];

                        // 根据文字长度调整字体大小
                        const fontSize = displayText.length === 1 ? 50 : 36;

                        // 转义 XML 特殊字符
                        const escapedText = displayText
                            .replace(/&/g, '&amp;')
                            .replace(/</g, '&lt;')
                            .replace(/>/g, '&gt;')
                            .replace(/"/g, '&quot;')
                            .replace(/'/g, '&apos;');

                        // 创建 SVG 图标
                        const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="${color}"/><text x="50" y="50" font-family="Arial, sans-serif" font-size="${fontSize}" font-weight="600" fill="white" text-anchor="middle" dominant-baseline="central">${escapedText}</text></svg>`;

                        // 使用 encodeURIComponent 代替 btoa，避免中文编码问题
                        return 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
                    } catch (e) {
                        console.error('Failed to create default icon:', e);
                        return '';
                    }
                }

            </script>

            <footer class="card-footer">
                <p>由 <a href="/">LinkCard</a> 驱动</p>
            </footer>
        </div>
    </div>
</body>
</html>
