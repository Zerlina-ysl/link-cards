<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} - 链接导航</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="page-wrapper">
        <div class="card-container">
            <header class="card-header">
                <div class="page-logo">
                    <svg width="32" height="32" viewBox="0 0 36 36" fill="none">
                        <rect width="36" height="36" rx="10" fill="url(#logo-gradient2)"/>
                        <path d="M12 18L16 14L20 18L24 14" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M12 22L16 18L20 22L24 18" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
                        <defs>
                            <linearGradient id="logo-gradient2" x1="0" y1="0" x2="36" y2="36" gradientUnits="userSpaceOnUse">
                                <stop stop-color="#6366F1"/>
                                <stop offset="1" stop-color="#8B5CF6"/>
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <h1>{{.Title}}</h1>
                <span class="card-count">{{len .Cards}} 个链接</span>
            </header>

            <main class="cards-grid">
                {{range .Cards}}
                <a href="{{.URL}}" target="_blank" class="link-card" data-url="{{.URL}}">
                    <div class="link-icon">
                        <img src="{{.Favicon}}"
                             alt="{{.Title}}"
                             loading="eager"
                             decoding="async"
                             onerror="handleImageError(this, '{{.URL}}')" />
                    </div>
                    <div class="link-title">{{.Title}}</div>
                </a>
                {{end}}
            </main>

            <script>
                // 页面加载完成后，预连接到图标服务器
                (function() {
                    const preconnect = document.createElement('link');
                    preconnect.rel = 'preconnect';
                    preconnect.href = 'https://www.google.com';
                    document.head.appendChild(preconnect);

                    const dnsPreconnect = document.createElement('link');
                    dnsPreconnect.rel = 'dns-prefetch';
                    dnsPreconnect.href = 'https://www.google.com';
                    document.head.appendChild(dnsPreconnect);
                })();

                // 图标加载失败时的处理
                function handleImageError(img, url) {
                    const retryCount = parseInt(img.dataset.retryCount || '0');

                    try {
                        const urlObj = new URL(url);
                        const protocol = urlObj.protocol;
                        const domain = urlObj.hostname;

                        // 尝试多种图标源
                        if (retryCount === 0) {
                            // 第一次重试: 尝试网站根目录的 favicon.ico
                            img.dataset.retryCount = '1';
                            img.src = `${protocol}//${domain}/favicon.ico`;
                        } else if (retryCount === 1) {
                            // 第二次重试: 尝试 DuckDuckGo 的 favicon 服务
                            img.dataset.retryCount = '2';
                            img.src = `https://icons.duckduckgo.com/ip3/${domain}.ico`;
                        } else if (retryCount === 2) {
                            // 第三次重试: 尝试 Favicon Kit
                            img.dataset.retryCount = '3';
                            img.src = `https://api.faviconkit.com/${domain}/64`;
                        } else {
                            // 所有尝试都失败，显示默认图标
                            showDefaultIcon(img, url);
                        }
                    } catch (e) {
                        showDefaultIcon(img, url);
                    }
                }

                // 显示默认图标（使用网站首字母）
                function showDefaultIcon(img, url) {
                    try {
                        const urlObj = new URL(url);
                        const domain = urlObj.hostname.replace('www.', '');
                        const firstLetter = domain.charAt(0).toUpperCase();

                        // 生成随机颜色（基于域名）
                        const colors = [
                            '#6366F1', '#8B5CF6', '#EC4899', '#EF4444',
                            '#F59E0B', '#10B981', '#3B82F6', '#06B6D4'
                        ];
                        const colorIndex = domain.charCodeAt(0) % colors.length;
                        const color = colors[colorIndex];

                        // 创建 SVG 图标
                        const svg = `
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
                                <rect width="100" height="100" fill="${color}"/>
                                <text x="50" y="50"
                                      font-family="Arial, sans-serif"
                                      font-size="50"
                                      font-weight="600"
                                      fill="white"
                                      text-anchor="middle"
                                      dominant-baseline="central">
                                    ${firstLetter}
                                </text>
                            </svg>
                        `;

                        img.src = 'data:image/svg+xml;base64,' + btoa(svg);
                        img.onerror = null;
                    } catch (e) {
                        console.error('Failed to create default icon:', e);
                    }
                }
            </script>

            <footer class="card-footer">
                <p>由 <a href="/">LinkCard</a> 驱动</p>
            </footer>
        </div>
    </div>
</body>
</html>
